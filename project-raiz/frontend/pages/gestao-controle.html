<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Controle - InfoTech</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="stylesheet" href="../styles/gestao-controle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/SVG/InfoTech.svg" sizes="any">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/SVG/InfoTech.svg" alt="Logo InfoTech" class="logo-sidebar">
            </div>

            <nav class="menu">
                <p class="menu-label">MENU</p>
                <ul>
                    <li class="nav-dash"><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li class="nav-estoque"><a href="estoque.html"><i class="fas fa-boxes"></i> Estoque</a></li>
                    <li class="nav-controle active"><a href="gestao-controle.html"><i class="fas fa-exchange-alt"></i>
                            Gestão de Controle</a></li>
                </ul>

                <p class="menu-label">OUTROS</p>
                <ul>
                    <li><a href="../../index.html" class="logout-link"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2 style="color: var(--text-light); font-weight: 400; font-size: 1.5rem;">Movimentação de Estoque</h2>
                <div class="user-profile">
                    <span id="userNameDisplay">Administrador</span>
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </header>

            <section class="content-body">
                <div class="controle-grid">
                    <div class="card-movimentacao">
                        <h3>Registrar Movimentação</h3>
                        <form id="formMovimentacao">
                            <div class="form-group">
                                <label for="selectProduto">Selecionar Item</label>
                                <select id="selectProduto" required></select>
                            </div>
                            <div class="form-group">
                                <label for="tipoMov">Tipo de Operação</label>
                                <select id="tipoMov">
                                    <option value="entrada">Entrada (+)</option>
                                    <option value="saida">Saída (-)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="qtdMov">Quantidade</label>
                                <input type="number" id="qtdMov" min="1" required>
                            </div>
                            <div class="form-group">
                                <label for="dataMov">Data da Operação</label>
                                <input type="date" id="dataMov" required>
                            </div>
                            <button type="submit" class="btn-primary">Confirmar Movimentação</button>
                        </form>
                    </div>

                    <div class="cards-tabelas-container">
                        <div class="card-tabela">
                            <h3>Saldos de Estoque</h3>
                            <div class="table-scroll">
                                <table class="styled-table full-width-table">
                                    <thead>
                                        <tr>
                                            <th>Produto</th>
                                            <th>Categoria</th>
                                            <th>Qtd. Atual</th>
                                            <th>Qtd. Mínima</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabelaSaldos"></tbody>
                                </table>
                            </div>
                        </div>

                        <div class="card-tabela">
                            <div class="card-header-flex">
                                <h3>Histórico de Movimentações Recentes</h3>
                                <select id="filtroHistorico" class="select-filtro" title="Filtrar período">
                                    <option value="hoje">Hoje</option>
                                    <option value="7">7 dias</option>
                                    <option value="30">30 dias</option>
                                    <option value="todos">Todos</option>
                                </select>
                            </div>
                            <div class="table-scroll">
                                <table class="styled-table full-width-table">
                                    <thead>
                                        <tr>
                                            <th>Data</th>
                                            <th>Produto</th>
                                            <th>Tipo</th>
                                            <th>Qtd.</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabelaHistoricoMov"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="../JS/config.js"></script>
    <script src="../JS/gestao-controle.js"></script>
</body>

</html>
